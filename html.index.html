<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典貪吃蛇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #1a1a1a;
            touch-action: none; /* 防止行動裝置縮放與滾動 */
            overflow: hidden;
        }
        canvas {
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            background-color: #000;
            image-rendering: pixelated;
        }
        .retro-font {
            font-family: 'Courier New', Courier, monospace;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen text-white">

    <div class="text-center mb-4">
        <h1 class="text-4xl font-bold mb-2 text-green-500 retro-font">SNAKE GAME</h1>
        <div class="flex justify-center space-x-8 text-xl">
            <p>得分: <span id="score">0</span></p>
            <p>最高紀錄: <span id="highScore">0</span></p>
        </div>
    </div>

    <!-- 遊戲畫布容器 -->
    <div class="relative">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <!-- 遊戲結束/開始 覆蓋層 -->
        <div id="overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black bg-opacity-70 transition-opacity">
            <h2 id="overlayTitle" class="text-3xl font-bold mb-4 text-yellow-400">準備好了嗎？</h2>
            <button id="startBtn" class="px-8 py-3 bg-green-600 hover:bg-green-500 text-white rounded-full font-bold text-xl transition-transform transform hover:scale-105">
                開始遊戲
            </button>
        </div>
    </div>

    <!-- 行動裝置控制鈕 -->
    <div class="mt-8 grid grid-cols-3 gap-2 md:hidden">
        <div></div>
        <button id="upBtn" class="w-16 h-16 bg-gray-700 rounded-lg flex items-center justify-center text-2xl">▲</button>
        <div></div>
        <button id="leftBtn" class="w-16 h-16 bg-gray-700 rounded-lg flex items-center justify-center text-2xl">◀</button>
        <button id="downBtn" class="w-16 h-16 bg-gray-700 rounded-lg flex items-center justify-center text-2xl">▼</button>
        <button id="rightBtn" class="w-16 h-16 bg-gray-700 rounded-lg flex items-center justify-center text-2xl">▶</button>
    </div>

    <div class="mt-4 text-gray-400 text-sm hidden md:block">
        使用方向鍵控制方向 | 空白鍵暫停
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const startBtn = document.getElementById('startBtn');

        // 遊戲參數
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let score = 0;
        let highScore = 0;
        let dx = 0;
        let dy = 0;
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let gameRunning = false;
        let gameSpeed = 100;
        let timeoutId = null;

        // 初始化
        function init() {
            snake = [
                {x: 10, y: 10},
                {x: 10, y: 11},
                {x: 10, y: 12}
            ];
            dx = 0;
            dy = -1;
            score = 0;
            scoreElement.innerText = score;
            createFood();
        }

        // 開始遊戲
        function startGame() {
            init();
            gameRunning = true;
            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.style.display = 'none', 300);
            main();
        }

        // 遊戲結束
        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                highScoreElement.innerText = highScore;
            }
            overlayTitle.innerText = "遊戲結束！";
            startBtn.innerText = "再試一次";
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            clearTimeout(timeoutId);
        }

        // 遊戲主迴圈
        function main() {
            if (!gameRunning) return;

            timeoutId = setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, gameSpeed);
        }

        // 清除畫布
        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 繪製格線 (選用)
            ctx.strokeStyle = "#111";
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
            }
        }

        // 繪製蛇
        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#4ADE80" : "#166534"; // 頭部較亮
                ctx.strokeStyle = "#000";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        // 移動蛇
        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // 檢查撞牆
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return gameOver();
            }

            // 檢查撞到自己
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    return gameOver();
                }
            }

            snake.unshift(head);

            // 檢查吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                createFood();
                // 稍微加速
                if (gameSpeed > 50) gameSpeed -= 1;
            } else {
                snake.pop();
            }
        }

        // 產生食物
        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // 確保食物不會生在蛇身上
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) createFood();
            });
        }

        // 繪製食物
        function drawFood() {
            ctx.fillStyle = "#F87171";
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
        }

        // 控制邏輯
        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;
            const SPACE_KEY = 32;

            if (event.keyCode === SPACE_KEY) {
                gameRunning = !gameRunning;
                if (gameRunning) main();
                return;
            }

            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === LEFT_KEY && !goingRight) { dx = -1; dy = 0; }
            if (keyPressed === UP_KEY && !goingDown) { dx = 0; dy = -1; }
            if (keyPressed === RIGHT_KEY && !goingLeft) { dx = 1; dy = 0; }
            if (keyPressed === DOWN_KEY && !goingUp) { dx = 0; dy = 1; }
        }

        // 事件監聽
        window.addEventListener('keydown', changeDirection);
        startBtn.addEventListener('click', startGame);

        // 觸控按鈕事件
        document.getElementById('upBtn').onclick = () => { if(dy !== 1) { dx = 0; dy = -1; }};
        document.getElementById('downBtn').onclick = () => { if(dy !== -1) { dx = 0; dy = 1; }};
        document.getElementById('leftBtn').onclick = () => { if(dx !== 1) { dx = -1; dy = 0; }};
        document.getElementById('rightBtn').onclick = () => { if(dx !== -1) { dx = 1; dy = 0; }};

        // 初始繪製畫布
        clearCanvas();
    </script>
</body>
</html>
